name: Build

on:
  push:
    branches: [ "master" ] # 每次你推代码到 main 分支就会自动打包

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 签出代码
      uses: actions/checkout@v4

    - name: 设置 Java 环境
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17' # 保持与你本地项目一致

    - name: 赋予 Gradle 执行权限
      run: chmod +x gradlew

    - name: 编译测试版 APK (自动使用系统默认测试签名)
      run: ./gradlew assembleDebug

    - name: 上传打包好的测试 APK
      uses: actions/upload-artifact@v4
      with:
        name: test-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
