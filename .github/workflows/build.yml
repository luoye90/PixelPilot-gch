name: Build

on:
  push:
    branches:
      - 'master'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # 删除了正式环境绑定，不再受 secrets 限制
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # 保留你的子模块拉取，解决 C++ 源码缺失问题

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 删除了 Decode Keystore 步骤，不再需要签名证书文件

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          # 改为编译 Debug 版本，完全依靠 Android 默认的测试签名
          ./gradlew assembleDebug
          # 将生成的测试版 APK 重命名移动到根目录
          mv app/build/outputs/apk/debug/app-debug.apk PixelPilot.apk

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name == 'master' && 'latest' || github.ref_name }}
          files: PixelPilot.apk
