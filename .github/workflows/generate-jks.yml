name: Generate JKS Key

on:
  workflow_dispatch: # 允許你在網頁上手動觸發執行

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate JKS
        run: |
          # 根據你的 Gradle 設定：檔名 fpv.jks、別名 fpv、密碼 release
          keytool -genkey -v \
            -keystore pixelpilot.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias fpv \
            -storepass "release" \
            -keypass "release" \
            -dname "CN=PixelPilot, OU=Dev, O=PixelPilot, L=HK, S=HK, C=HK"

          # 自動轉換成無換行符的 Base64 純文字
          base64 -w 0 pixelpilot.jks > base64_clean.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fpv-keys
          path: |
            pixelpilot.jks
            base64_clean.txt
